<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="10" fill="#00B050"/>

  <!-- Gear -->
  <g fill="#FFFFFF">
    <!-- Center circle -->
    <circle cx="24" cy="24" r="6" fill="#FFFFFF"/>

    <!-- Gear teeth -->
    <rect x="22" y="10" width="4" height="4" rx="1" fill="#FFFFFF"/>
    <rect x="22" y="34" width="4" height="4" rx="1" fill="#FFFFFF"/>
    <rect x="10" y="22" width="4" height="4" rx="1" fill="#FFFFFF"/>
    <rect x="34" y="22" width="4" height="4" rx="1" fill="#FFFFFF"/>

    <!-- Diagonal teeth -->
    <rect x="28.5" y="13.5" width="3.5" height="3.5" rx="0.8" transform="rotate(45 30.25 15.25)" fill="#FFFFFF"/>
    <rect x="16" y="31.5" width="3.5" height="3.5" rx="0.8" transform="rotate(45 17.75 33.25)" fill="#FFFFFF"/>
    <rect x="13.5" y="28.5" width="3.5" height="3.5" rx="0.8" transform="rotate(-45 15.25 30.25)" fill="#FFFFFF"/>
    <rect x="31.5" y="16" width="3.5" height="3.5" rx="0.8" transform="rotate(-45 33.25 17.75)" fill="#FFFFFF"/>
  </g>

  <!-- Inner circle -->
  <circle cx="24" cy="24" r="3" fill="#00B050"/>
</svg>
