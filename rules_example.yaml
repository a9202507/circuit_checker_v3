rules:
  - id: rule-001
    description: GlobalSymbol must have a name attribute
    severity: ERROR
    match:
      tag: GlobalSymbol
      attr:
        name: null
  - id: rule-002
    description: Defn objectType should be SCHEMATIC
    severity: ERROR
    match:
      tag: Defn
      attr:
        objectType: SCHEMATIC
  - id: rule-003
    description: Node depth greater than 10 (warning)
    severity: WARN
    match:
      depth_gt: 10
